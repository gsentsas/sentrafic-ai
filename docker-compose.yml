version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: sentrafic-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentrafic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentrafic_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sentrafic}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-api/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sentrafic-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentrafic} -d ${POSTGRES_DB:-sentrafic}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: sentrafic-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentrafic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: sentrafic-backend
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sentrafic}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sentrafic_dev}
      - POSTGRES_DB=${POSTGRES_DB:-sentrafic}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - APP_DEBUG=${APP_DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend-api:/app
      - ./backend-api/logs:/app/logs
    networks:
      - sentrafic-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  vision-engine:
    build:
      context: ./vision-engine
      dockerfile: Dockerfile
    container_name: sentrafic-vision
    environment:
      - YOLO_MODEL=${YOLO_MODEL:-yolov8n.pt}
      - YOLO_CONFIDENCE=${YOLO_CONFIDENCE:-0.5}
      - YOLO_IOU=${YOLO_IOU:-0.45}
      - VISION_CAMERA_ID=${VISION_CAMERA_ID:-1}
      - VISION_CAMERA_NAME=${VISION_CAMERA_NAME:-Demo Camera}
      - VISION_SOURCE=${VISION_SOURCE:-samples/videos/demo.mp4}
      - VISION_FPS=${VISION_FPS:-30}
      - VISION_FRAME_WIDTH=${VISION_FRAME_WIDTH:-1280}
      - VISION_FRAME_HEIGHT=${VISION_FRAME_HEIGHT:-720}
      - VISION_BATCH_SIZE=${VISION_BATCH_SIZE:-1}
      - VISION_USE_GPU=${VISION_USE_GPU:-false}
      - VISION_GPU_DEVICE=${VISION_GPU_DEVICE:-0}
      - VISION_BACKEND_URL=http://backend-api:8000
      - VISION_API_KEY=${VISION_API_KEY:-your-api-key}
      - VISION_PUBLISH_INTERVAL=${VISION_PUBLISH_INTERVAL:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      backend-api:
        condition: service_healthy
    volumes:
      - ./vision-engine:/app
      - ./vision-engine/logs:/app/logs
      - ./samples:/app/samples:ro
    networks:
      - sentrafic-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    command: python main.py

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-SEN TRAFIC AI}
    container_name: sentrafic-dashboard
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-SEN TRAFIC AI}
      - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION:-1.0.0-MVP}
      - NODE_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      - backend-api
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - /app/.next
    networks:
      - sentrafic-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  sentrafic-net:
    driver: bridge
